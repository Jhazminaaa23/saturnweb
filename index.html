<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 10 Saturn</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    color:white;
    overflow-x:hidden;
}


nav{
    position:fixed;
    width:100%;
    top:0;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(10px);
    z-index:10;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}


.video-container{
    position:relative;
    height:100vh;
    overflow:hidden;
}

.video-container video{
    position:absolute;
    top:50%;
    left:50%;
    min-width:100%;
    min-height:100%;
    transform:translate(-50%, -50%);
    object-fit:cover;
}


.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}


.content{
    position:relative;
    z-index:2;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.content h1{
    font-size:55px;
}

.content p{
    margin-top:15px;
    max-width:600px;
}

@media(max-width:768px){
    .content h1{
        font-size:35px;
    }
}
</style>
</head>

<body>

<nav>
    <h2>🪐 Grade 10 Saturn</h2>
    <div>
        <a href="index.html.html">Home</a>
        <a href="about.html">About</a>
	<a href="officers.html">Officers</a>
	<a href="gallery.html">Gallery</a>
    </div>
</nav>

<section class="video-container">

    
    <video autoplay muted loop playsinline>
        <source src="videos/saturnbg.mp4" type="video/mp4">

    </video>

    <div class="overlay"></div>

    <div class="content">
        <h1>Welcome to Grade 10 Saturn 🚀</h1>
        <p>Exploring knowledge beyond limits. Reaching for the stars together.</p>
    </div>

</section>

</body>
</html>

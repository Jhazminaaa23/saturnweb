<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Grade 10 Saturn</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: radial-gradient(circle at top, #1a1a3a, #0b0f2a 70%);
    color:white;
    overflow-x:hidden;
}


.stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

.stars span{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    opacity:0.8;
    animation:starMove 40s linear infinite;
}

@keyframes starMove{
    from{transform:translateY(0);}
    to{transform:translateY(-1000px);}
}


nav{
    display:flex;
    justify-content:space-between;
    padding:20px 8%;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(12px);
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

nav a:hover{
    color:#ffd700;
}


.header{
    text-align:center;
    padding:80px 20px 40px;
}

.header h1{
    font-size:40px;
    background:linear-gradient(90deg,#ffd700,#ffffff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}


.gallery{
    padding:40px 8%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    border-radius:15px;
    cursor:pointer;
    transition:0.4s;
}

.gallery img:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px rgba(255,215,0,0.7);
}


.lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}


</style>
</head>

<body>

<div class="stars"></div>

<nav>
    <h2>🪐 Grade 10 Saturn</h2>
    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="officers.html">Officers</a>
        <a href="gallery.html">Gallery</a>
    </div>
</nav>

<section class="header">
    <h1>Our Memories 📸</h1>
</section>

<section class="gallery">

    
    <img src="photo1.jpg" onclick="openLightbox(this.src)">
    <img src="photo2.jpg" onclick="openLightbox(this.src)">
    <img src="photo3.jpg" onclick="openLightbox(this.src)">
    <img src="photo4.jpg" onclick="openLightbox(this.src)">
    <img src="photo5.jpg" onclick="openLightbox(this.src)">
    <img src="photo6.jpg" onclick="openLightbox(this.src)">

</section>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
</div>



<script>
const starsContainer = document.querySelector(".stars");
for(let i=0;i<200;i++){
    let star=document.createElement("span");
    star.style.left=Math.random()*100+"%";
    star.style.top=Math.random()*100+"%";
    star.style.animationDuration=(20+Math.random()*20)+"s";
    starsContainer.appendChild(star);
}


function openLightbox(src){
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightbox-img").src=src;
}

function closeLightbox(){
    document.getElementById("lightbox").style.display="none";
}
</script>

</body>

</html>
